<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mentes Inquietas | Personalizar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --white: #ffffff; --bege-light: #F9F7F2; --purple-soft: #D1C4E9; --header-bg: #1d1d1f; --text-dark: #1d1d1f; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--white); }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        header { padding: 15px 0; position: fixed; width: 100%; top: 0; z-index: 1000; background: var(--header-bg); }
        nav { display: flex; justify-content: space-between; align-items: center; }
        .nav-links a { text-decoration: none; color: white; margin: 0 15px; font-size: 13px; text-transform: uppercase; }
        .logo img { height: 35px; }
        .configurator { display: grid; grid-template-columns: 1fr 400px; padding-top: 70px; min-height: 100vh; }
        .preview { background: var(--bege-light); display: flex; justify-content: center; align-items: center; }
        .notebook { width: 300px; height: 400px; background: var(--purple-soft); border-radius: 0 20px 20px 0; box-shadow: 20px 20px 40px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .controls { padding: 60px 40px; }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 1px solid #ddd; border-radius: 10px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="loja.html">Loja</a>
                </div>
                <div class="logo"><img src="assets/img/Osh_logo.png" alt="Logo" onerror="this.src='https://via.placeholder.com/150x50/1d1d1f/ffffff?text=OS_H'"></div>
                <div class="nav-links">
                    <a href="personalizar.html" style="color: var(--purple-soft);">Personalizar</a>
                    <a href="#">Carrinho (0)</a>
                </div>
            </nav>
        </div>
    </header>
    <div class="configurator">
        <div class="preview">
            <div class="notebook" id="nb">A tua frase</div>
        </div>
        <div class="controls">
            <h1>Personaliza</h1>
            <p>Escreve a tua frase na capa:</p>
            <input type="text" placeholder="Escreve aqui..." onkeyup="document.getElementById('nb').innerText = this.value">
            <button style="background: black; color: white; width: 100%; padding: 20px; border-radius: 40px; border: none; font-weight: 700; cursor: pointer;">Finalizar Compra</button>
        </div>
    </div>
</body>
</html>
