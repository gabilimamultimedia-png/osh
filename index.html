<!DOCTYPE html>

<head>

        .logo img { height: 35px; }
        .hero { padding: 180px 0 100px; text-align: center; background: var(--bege-light); }
        .hero h1 { font-size: 56px; margin-bottom: 20px; letter-spacing: -2px; }
        .btn { background: var(--text-dark); color: white; padding: 15px 30px; border-radius: 30px; text-decoration: none; font-weight: 600; display: inline-block; margin-top: 20px; }
    </style>
</head>
<body>
