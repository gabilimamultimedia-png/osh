<!-- Exemplo de Estrutura da Homepage -->
<!DOCTYPE html>
<html lang="pt">
<head>
    <link rel="stylesheet" href="style.css">
    <title>Papelaria para Mentes Inquietas</title>
</head>
<body>
    <nav class="navbar">
        <div class="nav-links">
            <a href="/shop">Loja</a>
            <a href="/personalizar">Personalizar</a>
        </div>
        <img src="assets/img/Osh_logo.png" alt="Logo Mentes Inquietas" class="logo">
        <div class="nav-user">
            <a href="/search">Busca</a>
            <a href="/cart">Carrinho (0)</a>
        </div>
    </nav>

    <main>
        <!-- Hero Section Interativa -->
        <section class="hero-section">
            <div class="hero-content">
                <h1>Organiza o teu caos criativo.</h1>
                <button class="btn-primary">Descobrir Cadernos</button>
            </div>
            <div class="hero-visual">
                <canvas id="notebook-3d-canvas"></canvas> <!-- Render 3D ou Animação Lottie -->
            </div>
        </section>

        <!-- Grid de Produtos (Componente Reutilizável) -->
        <section class="product-grid">
            <article class="product-card">
                <div class="badge">Artesanal</div>
                <img src="caderno-roxo.jpg" alt="Caderno Criativo">
                <h3>Caderno de Ideias Fluídas</h3>
                <p>24,90€</p>
            </article>
        </section>
    </main>
</body>
</html>
